version: "3.8"

services:
  external-api:
    build: ./ExternalApiMock
    ports:
      - "8080:8080"
    networks:
      - poc-network

  gateway-api:
    build: ./GatewayApi
    ports:
      - "8081:8080"
    environment:
      - EXTERNAL_API_BASE_URL=http://external-api:8080
    depends_on:
      - external-api
    networks:
      - poc-network

networks:
  poc-network: {}
